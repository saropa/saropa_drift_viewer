# Add a pub.dev uploader. Requires repository secret PUB_DEV_UPLOADER_EMAIL.
# Trigger manually from Actions tab.
name: add-uploader

on:
  workflow_dispatch:

jobs:
  add-uploader:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Add uploader to pub.dev
        run: dart pub uploader add "${{ secrets.PUB_DEV_UPLOADER_EMAIL }}"
