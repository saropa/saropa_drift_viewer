name: fix-publisher

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get OIDC token and fix publisher
        run: |
          set -x

          # Get GitHub OIDC token with pub.dev audience
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://pub.dev" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")

          echo "Got OIDC token (first 20 chars): ${OIDC_TOKEN:0:20}..."

          PKG="saropa_drift_viewer"
          EMAIL="${{ secrets.PUB_DEV_UPLOADER_EMAIL }}"

          # Attempt 1: Invite uploader
          echo "=== Attempting invite-uploader ==="
          curl -sS -w "\nHTTP %{http_code}\n" -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"email\": \"$EMAIL\"}" \
            "https://pub.dev/api/packages/$PKG/invite-uploader" || true

          # Attempt 2: Transfer to verified publisher
          echo "=== Attempting set-publisher ==="
          curl -sS -w "\nHTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"publisherId": "saropa.com"}' \
            "https://pub.dev/api/packages/$PKG/publisher" || true

          # Attempt 3: Discontinue package
          echo "=== Attempting discontinue ==="
          curl -sS -w "\nHTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isDiscontinued": true}' \
            "https://pub.dev/api/packages/$PKG/options" || true

          # Attempt 4: Retract versions
          echo "=== Attempting retract 0.2.1 ==="
          curl -sS -w "\nHTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isRetracted": true}' \
            "https://pub.dev/api/packages/$PKG/versions/0.2.1/options" || true

          echo "=== Attempting retract 0.2.2 ==="
          curl -sS -w "\nHTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"isRetracted": true}' \
            "https://pub.dev/api/packages/$PKG/versions/0.2.2/options" || true
