name: publish

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v6

      # Provision OIDC token for pub.dev (required for dart pub publish and dart pub uploader).
      - uses: dart-lang/setup-dart@v1

      # Package depends on flutter SDK (pubspec.yaml); use Flutter so pub get and analyze succeed.
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force
