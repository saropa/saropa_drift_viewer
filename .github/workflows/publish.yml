name: publish

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@v4

      # Provision OIDC token for pub.dev (required for dart pub publish and dart pub uploader).
      - uses: dart-lang/setup-dart@v1

      # Package depends on flutter SDK (pubspec.yaml); use Flutter so pub get and analyze succeed.
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run tests
        run: flutter test

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        run: dart pub publish --force

      # One-time: add your Google account as uploader so you can use the Admin tab on pub.dev.
      # 1. Add a repo secret PUB_DEV_UPLOADER_EMAIL with your Google account email.
      # 2. Push a tag (or run the add-uploader workflow below) to trigger this.
      # 3. After you have access, remove this step and the add-uploader workflow.
      - name: Add uploader (remove after you have access)
        run: dart pub uploader add ${{ secrets.PUB_DEV_UPLOADER_EMAIL }}
        continue-on-error: true
