name: example
description: Example Flutter app using saropa_drift_advisor with a Drift database.
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path: ^1.9.0
  path_provider: ^2.1.5
  saropa_drift_advisor:
    path: ..

dev_dependencies:
  drift_dev: ">=2.31.0 <2.32.0" # 2.32.0 requires analyzer ^10.0.0, incompatible with saropa_lints (analyzer ^9.0.0)
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # COMMENT OUT FOR LOCAL TESTING
  # 2050+ lint rules for Flutter and Dart. Free. Open source.
  # https://pub.dev/packages/saropa_lints/changelog
  # saropa_lints: ^5.0.1 # Disabled — analyzer ^9.0.0 conflict with isar_community_generator (<8.3.0)
  saropa_lints: ^8.0.11

flutter:
  uses-material-design: true
